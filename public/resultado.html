<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado — Planej. Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Resultado</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <div class="content">
  <div class="card">
    <h2>Resultado do cálculo</h2>
    <div class="row" style="justify-content: space-between">
      <div style="max-width: 400px; flex: 1">
        <select id="sel-programa">
          <option value="">Escolha um programa</option>
        </select>
      </div>
      <button id="btn-exportar" disabled>Exportar Excel</button>
    </div>
  </div>

  <div class="kg" id="kpi-grid" style="display:none">
    <div class="kpi">
      <div class="kpi-label">Componentes na necessidade</div>
      <div class="kpi-value" id="kpi-total">0</div>
    </div>
    <div class="kpi accent">
      <div class="kpi-label">A comprar (itens)</div>
      <div class="kpi-value" id="kpi-criticos">0</div>
    </div>
    <div class="kpi green">
      <div class="kpi-label">Cobertos pelo estoque</div>
      <div class="kpi-value" id="kpi-ok">0</div>
    </div>
    <div class="kpi blue">
      <div class="kpi-label">Soma a comprar</div>
      <div class="kpi-value" id="kpi-soma">0</div>
    </div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Componente</th>
          <th>Descrição</th>
          <th>UMC</th>
          <th>Necessidade total</th>
          <th>Estoque atual</th>
          <th>A comprar</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <p class="muted" id="vazio">Escolha um programa para calcular.</p>
  </div>
    </div>
  </div>
</div>
<script src="/app.js"></script>
<script>
  let linhasAtuais = [];
  let programaNome = "";

  async function carregarProgramas() {
    const programas = await api("/api/programas");
    const sel = document.getElementById("sel-programa");
    sel.innerHTML =
      `<option value="">Escolha um programa</option>` +
      programas.map((p) => `<option value="${p.id}" data-nome="${p.nome}">${p.nome} (${p.status})</option>`).join("");

    const params = new URLSearchParams(window.location.search);
    const programaId = params.get("programaId");
    if (programaId) {
      sel.value = programaId;
      await calcular(programaId);
    }
  }

  async function calcular(programaId) {
    if (!programaId) {
      linhasAtuais = [];
      renderTabela();
      return;
    }
    const sel = document.getElementById("sel-programa");
    const opt = sel.querySelector(`option[value="${programaId}"]`);
    programaNome = opt ? opt.dataset.nome : programaId;

    document.getElementById("vazio").textContent = "Calculando...";
    linhasAtuais = await api(`/api/calculo?programaId=${programaId}`);
    renderTabela();
  }

  function renderKpis() {
    const kpiGrid = document.getElementById("kpi-grid");
    if (linhasAtuais.length === 0) {
      kpiGrid.style.display = "none";
      return;
    }
    kpiGrid.style.display = "grid";
    const criticos = linhasAtuais.filter((l) => Number(l.a_comprar) > 0);
    const soma = linhasAtuais.reduce((acc, l) => acc + Number(l.a_comprar), 0);
    document.getElementById("kpi-total").textContent = linhasAtuais.length;
    document.getElementById("kpi-criticos").textContent = criticos.length;
    document.getElementById("kpi-ok").textContent = linhasAtuais.length - criticos.length;
    document.getElementById("kpi-soma").textContent = soma.toLocaleString("pt-BR");
  }

  function renderTabela() {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = linhasAtuais
      .map((l) => {
        const aComprar = Number(l.a_comprar);
        return `
          <tr class="${aComprar > 0 ? "a-comprar" : "ok"}">
            <td>${l.componente_codigo}</td>
            <td>${l.componente_descricao}</td>
            <td>${l.umc}</td>
            <td>${l.necessidade_total}</td>
            <td>${l.estoque_atual}</td>
            <td class="valor-comprar">${l.a_comprar}</td>
          </tr>`;
      })
      .join("");
    document.getElementById("vazio").textContent = linhasAtuais.length
      ? ""
      : "Nenhum componente calculado para este programa.";
    document.getElementById("vazio").style.display = linhasAtuais.length ? "none" : "block";
    document.getElementById("btn-exportar").disabled = linhasAtuais.length === 0;
    renderKpis();
  }

  document.getElementById("sel-programa").addEventListener("change", (e) => {
    calcular(e.target.value);
  });

  document.getElementById("btn-exportar").addEventListener("click", () => {
    const dados = linhasAtuais.map((l) => ({
      Componente: l.componente_codigo,
      Descrição: l.componente_descricao,
      UMC: l.umc,
      "Necessidade total": Number(l.necessidade_total),
      "Estoque atual": Number(l.estoque_atual),
      "A comprar": Number(l.a_comprar),
    }));
    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Necessidade de compra");
    XLSX.writeFile(wb, `necessidade-compra-${programaNome}.xlsx`);
  });

  carregarProgramas();
</script>
</body>
</html>
