<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiais — Planej. Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Materiais</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <div class="content">
  <div class="card">
    <h2>Novo material</h2>
    <form id="form-material" class="grid cols-2">
      <div>
        <label for="codigo">Código</label>
        <input id="codigo" placeholder="ex: 9057" required>
      </div>
      <div>
        <label for="descricao">Descrição</label>
        <input id="descricao" required>
      </div>
      <div>
        <label for="umc">UMC</label>
        <input id="umc" value="PC" placeholder="PC, CX, KG...">
      </div>
      <div>
        <label for="tipo">Tipo</label>
        <select id="tipo">
          <option value="componente">Componente</option>
          <option value="acabado">Acabado</option>
        </select>
      </div>
      <div style="grid-column: 1 / -1">
        <p class="erro" id="erro" style="display:none"></p>
        <button type="submit" id="btn-salvar">Adicionar</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="tabs">
      <button type="button" class="tab-btn active" data-pane="acabados">Acabados <span id="count-acabados"></span></button>
      <button type="button" class="tab-btn" data-pane="componentes">Componentes <span id="count-componentes"></span></button>
    </div>

    <div class="tab-pane active" id="pane-acabados">
      <table>
        <thead>
          <tr><th>Código</th><th>Descrição</th><th>UMC</th><th></th></tr>
        </thead>
        <tbody id="tbody-acabados"></tbody>
      </table>
      <p class="muted" id="vazio-acabados" style="display:none">Nenhum acabado cadastrado.</p>
    </div>

    <div class="tab-pane" id="pane-componentes">
      <table>
        <thead>
          <tr><th>Código</th><th>Descrição</th><th>UMC</th><th></th></tr>
        </thead>
        <tbody id="tbody-componentes"></tbody>
      </table>
      <p class="muted" id="vazio-componentes" style="display:none">Nenhum componente cadastrado.</p>
    </div>
  </div>
    </div>
  </div>
</div>
<script src="/app.js"></script>
<script>
  let materiaisPorId = new Map();
  let componentesDisponiveis = [];
  let editando = null; // { id, tipo, bomId }
  let itensBomEditando = [];
  let carregandoItensBom = false;
  let comboBomComponente = null;

  function linhaMaterial(m) {
    const linha = `
      <tr>
        <td>${m.codigo}</td>
        <td>${m.descricao}</td>
        <td>${m.umc}</td>
        <td>
          <button class="secondary" onclick="abrirEditor(${m.id})">Editar</button>
          <button class="ghost" onclick="excluir(${m.id})">Excluir</button>
        </td>
      </tr>`;
    if (editando && editando.id === Number(m.id)) {
      return linha + linhaEdicao(m);
    }
    return linha;
  }

  function linhaEdicao(m) {
    return `
      <tr class="linha-edicao">
        <td colspan="4">
          <div style="padding: 16px; background: var(--surface-2); border-radius: var(--radius)">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px">
              <strong>Editando ${m.tipo === "acabado" ? "acabado" : "componente"}</strong>
              <button type="button" class="secondary" onclick="fecharEditor()">Fechar</button>
            </div>
            <form class="grid cols-3" onsubmit="salvarEdicaoMaterial(event)">
              <div>
                <label>Código</label>
                <input name="codigo" value="${m.codigo}" required>
              </div>
              <div>
                <label>Descrição</label>
                <input name="descricao" value="${m.descricao}" required>
              </div>
              <div>
                <label>UMC</label>
                <input name="umc" value="${m.umc}">
              </div>
              <div style="grid-column: 1 / -1">
                <p class="erro" id="edit-erro" style="display:none"></p>
                <button type="submit">Salvar alterações</button>
              </div>
            </form>
            ${m.tipo === "acabado" ? blocoListaTecnica() : ""}
          </div>
        </td>
      </tr>`;
  }

  function blocoListaTecnica() {
    if (carregandoItensBom) {
      return `<div class="muted" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px">Carregando lista técnica...</div>`;
    }
    const linhasItens = itensBomEditando
      .map(
        (it) => `
        <tr>
          <td>${it.componente_codigo}</td>
          <td>${it.componente_descricao}</td>
          <td>${it.componente_umc}</td>
          <td>${formatNum(it.pcs_por_umc)}</td>
          <td><button class="ghost" onclick="removerItemBom(${it.id})">Remover</button></td>
        </tr>`
      )
      .join("");
    return `
      <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px">
        <h2>Lista técnica</h2>
        <form class="row" style="margin-bottom: 16px" onsubmit="adicionarItemBom(event)">
          <div style="flex: 1; min-width: 220px">
            <label>Componente</label>
            <div id="combo-bom-componente"></div>
          </div>
          <div style="width: 160px">
            <label>Peças por UMC</label>
            <input type="number" name="pcs" min="0" step="any" placeholder="ex: 6" required>
          </div>
          <button type="submit">Salvar item</button>
        </form>
        <p class="erro" id="edit-bom-erro" style="display:none"></p>
        <table>
          <thead>
            <tr><th>Componente</th><th>Descrição</th><th>UMC</th><th>Peças por UMC</th><th></th></tr>
          </thead>
          <tbody>${linhasItens}</tbody>
        </table>
        ${itensBomEditando.length === 0 ? `<p class="muted">Nenhum componente na lista técnica ainda.</p>` : ""}
      </div>`;
  }

  async function carregar() {
    const materiais = await api("/api/materiais");
    materiaisPorId = new Map(materiais.map((m) => [Number(m.id), m]));
    componentesDisponiveis = materiais.filter((m) => m.tipo === "componente");
    renderListas();
  }

  function renderListas() {
    const materiais = [...materiaisPorId.values()];
    const acabados = materiais.filter((m) => m.tipo === "acabado");
    const componentes = materiais.filter((m) => m.tipo === "componente");

    document.getElementById("count-acabados").textContent = acabados.length ? `(${acabados.length})` : "";
    document.getElementById("tbody-acabados").innerHTML = acabados.map(linhaMaterial).join("");
    document.getElementById("vazio-acabados").style.display = acabados.length ? "none" : "block";

    document.getElementById("count-componentes").textContent = componentes.length ? `(${componentes.length})` : "";
    document.getElementById("tbody-componentes").innerHTML = componentes.map(linhaMaterial).join("");
    document.getElementById("vazio-componentes").style.display = componentes.length ? "none" : "block";

    montarComboListaTecnica();
  }

  function montarComboListaTecnica() {
    if (!editando || editando.tipo !== "acabado" || carregandoItensBom) {
      comboBomComponente = null;
      return;
    }
    const opcoes = componentesDisponiveis.map((c) => ({ value: c.id, label: `${c.codigo} — ${c.descricao}` }));
    comboBomComponente = criarCombo("combo-bom-componente", opcoes, {
      placeholder: "Digite o código ou descrição do componente...",
    });
  }

  document.querySelectorAll(".tab-btn").forEach((btn) =>
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
      document.querySelectorAll(".tab-pane").forEach((p) => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("pane-" + btn.dataset.pane).classList.add("active");
    })
  );

  async function excluir(id) {
    if (!confirm("Excluir este material?")) return;
    await api("/api/materiais", { method: "DELETE", body: JSON.stringify({ id }) });
    if (editando && editando.id === Number(id)) {
      editando = null;
      itensBomEditando = [];
    }
    await carregar();
  }

  function fecharEditor() {
    editando = null;
    itensBomEditando = [];
    renderListas();
  }

  async function abrirEditor(id) {
    const m = materiaisPorId.get(Number(id));
    if (!m) return;
    editando = { id: Number(m.id), tipo: m.tipo, bomId: null };
    itensBomEditando = [];
    carregandoItensBom = m.tipo === "acabado";
    renderListas();

    if (m.tipo === "acabado") {
      const bom = await api("/api/boms", { method: "POST", body: JSON.stringify({ materialId: id }) });
      editando.bomId = bom.id;
      await carregarItensBom();
    }
  }

  async function carregarItensBom() {
    if (!editando || !editando.bomId) return;
    itensBomEditando = await api(`/api/bom-itens?bomId=${editando.bomId}`);
    carregandoItensBom = false;
    renderListas();
  }

  async function removerItemBom(itemId) {
    await api("/api/bom-itens", { method: "DELETE", body: JSON.stringify({ itemId }) });
    await carregarItensBom();
  }

  async function salvarEdicaoMaterial(event) {
    event.preventDefault();
    if (!editando) return;
    const form = event.target;
    const erroEl = document.getElementById("edit-erro");
    if (erroEl) erroEl.style.display = "none";
    try {
      await api("/api/materiais", {
        method: "PUT",
        body: JSON.stringify({
          id: editando.id,
          codigo: form.codigo.value,
          descricao: form.descricao.value,
          umc: form.umc.value,
          tipo: editando.tipo,
        }),
      });
      await carregar();
    } catch (err) {
      if (erroEl) {
        erroEl.textContent = err.message;
        erroEl.style.display = "block";
      }
    }
  }

  async function adicionarItemBom(event) {
    event.preventDefault();
    if (!editando || !editando.bomId) return;
    const form = event.target;
    const erroEl = document.getElementById("edit-bom-erro");
    if (erroEl) erroEl.style.display = "none";
    if (!comboBomComponente || !comboBomComponente.value) {
      if (erroEl) {
        erroEl.textContent = "escolha um componente";
        erroEl.style.display = "block";
      }
      return;
    }
    try {
      await api("/api/bom-itens", {
        method: "POST",
        body: JSON.stringify({
          bomId: editando.bomId,
          componenteId: Number(comboBomComponente.value),
          pcsPorUmc: Number(form.pcs.value),
        }),
      });
      await carregarItensBom();
    } catch (err) {
      if (erroEl) {
        erroEl.textContent = err.message;
        erroEl.style.display = "block";
      }
    }
  }

  document.getElementById("form-material").addEventListener("submit", async (e) => {
    e.preventDefault();
    const erroEl = document.getElementById("erro");
    const btn = document.getElementById("btn-salvar");
    erroEl.style.display = "none";
    btn.disabled = true;
    try {
      await api("/api/materiais", {
        method: "POST",
        body: JSON.stringify({
          codigo: document.getElementById("codigo").value,
          descricao: document.getElementById("descricao").value,
          umc: document.getElementById("umc").value,
          tipo: document.getElementById("tipo").value,
        }),
      });
      document.getElementById("form-material").reset();
      document.getElementById("umc").value = "PC";
      await carregar();
    } catch (err) {
      erroEl.textContent = err.message;
      erroEl.style.display = "block";
    } finally {
      btn.disabled = false;
    }
  });

  carregar();
</script>
</body>
</html>
